<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d9488" />
    <script>
      (() => {
        const STORAGE_KEY = '3dw-theme-mode';
        const root = document.documentElement;
        const DARK_THEME_COLOR = '#0b1220';
        const LIGHT_THEME_COLOR = '#0d9488';

        const isThemeMode = (value) => value === 'light' || value === 'dark' || value === 'system';

        let mode = 'system';
        try {
          const storedMode = window.localStorage.getItem(STORAGE_KEY);
          if (isThemeMode(storedMode)) {
            mode = storedMode;
          }
        } catch {
          // Ignore localStorage read errors.
        }

        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const resolved = mode === 'system' ? (prefersDark ? 'dark' : 'light') : mode;

        root.classList.toggle('dark', resolved === 'dark');
        root.dataset.themeMode = mode;
        root.dataset.resolvedTheme = resolved;
        root.style.colorScheme = resolved;

        const metaThemeColor = document.querySelector('meta[name="theme-color"]');
        if (metaThemeColor instanceof HTMLMetaElement) {
          metaThemeColor.setAttribute('content', resolved === 'dark' ? DARK_THEME_COLOR : LIGHT_THEME_COLOR);
        }
      })();
    </script>
    <meta
      name="description"
      content="Industrieller 3D-Druck Service für Maschinenbau, Produktion und Werkstätten: Ersatzteile, Prototypen und Vorrichtungen mit technischer Prüfung, klaren Lieferfenstern und qualifizierter Rückmeldung in der Regel innerhalb von 24 Stunden."
    />
    <title>3D-WINDT | Industriequalität im 3D-Druck</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
